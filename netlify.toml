# Netlify Configuration for MindfulTech Services
# @netlify/plugin-nextjs handles build output and routing automatically

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirects (backup for Next.js redirects)
[[redirects]]
  from = "/services"
  to = "/solutions"
  status = 301
  force = true

[[redirects]]
  from = "/how-it-works"
  to = "/process"
  status = 301
  force = true
